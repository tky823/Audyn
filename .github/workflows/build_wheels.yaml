name: Build wheels

on:
  pull_request:
    branches:
      - main

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
          - windows-latest
          - windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build wheels
        env:
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"  # for PyTorch
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_BUILD_VERBOSITY: 1
        uses: pypa/cibuildwheel@v3.4.0
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
