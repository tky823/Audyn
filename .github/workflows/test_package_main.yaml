# To create status badge per os, python-version, and torch-version, we use workflow call.
# https://github.com/orgs/community/discussions/52616

name: Tests for package and recipes
on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      python-version:
        required: true
        type: string
      torch-version:
        required: true
        type: string
      run-ddp:
        required: true
        type: boolean
    secrets:
      ACCESS_TOKEN:
        required: true
      CODECOV_TOKEN:
        required: true
jobs:
  package:
    name: Run package tests
    runs-on: ${{ inputs.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/audyn
            ~/.cache/audyn_test
          key: audyn-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            audyn-${{ runner.os }}-
      - name: Install dependencies (Windows)
        if: ${{ inputs.os == 'windows-latest' }}
        run: |
          powershell -File tests/scripts/install_windows_dependencies.ps1
      - name: Install dependencies (Ubuntu)
        if: ${{ inputs.os == 'ubuntu-latest' }}
        run: |
          . tests/scripts/free_ubuntu_disk.sh
          . tests/scripts/install_ubuntu_dependencies.sh
      - name: Install dependencies (MacOS)
        if: ${{ inputs.os == 'macos-15-intel' || inputs.os == 'macos-latest' }}
        run: |
          . tests/scripts/install_macos_dependencies.sh
      - name: Show version of FFmpeg
        run: |
          ffmpeg -version
      - name: Overwrite torch version in pyproject.toml
        shell: bash
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
          TORCH_VERSION: ${{ inputs.torch-version }}
        run: |
          uv venv --python ${PYTHON_VERSION}

          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          uv pip install packaging
          python tests/scripts/overwrite_pyproject_toml.py --path pyproject.toml --torch-version ${TORCH_VERSION}
      - name: Install dependencies
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          uv pip install -e ".[dev,tests]"

          if [ "${RUNNER_OS}" = "Windows" ]; then
            uv pip install soundfile
          fi
      - name: Install torchcodec
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          python tests/scripts/overwrite_torchcodec_requirement.py \
            --path requirements-torchcodec.txt

          uv pip install -r requirements-torchcodec.txt
      - name: Show dependencies
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          uv pip list
      - name: Verify version of torch
        shell: bash
        env:
          TORCH_VERSION: ${{ inputs.torch-version }}
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          python tests/scripts/verify_torch_version.py --torch-version "${TORCH_VERSION}"
      - name: Show backend of torchaudio
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          python tests/scripts/list_torchaudio_backends.py
          python tests/scripts/verify_torchaudio_backends.py
      - name: Pytest for torch.hub
        if: ${{ inputs.python-version == '3.13' && inputs.os == 'ubuntu-latest' && inputs.torch-version == '2.6.0' }}
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          source .venv/bin/activate
          uv run --active pytest -vvv tests/torchhub/
      - name: Run package tests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          MPLBACKEND: AGG
          USE_LIBUV: 0
        run: |
          PYTEST_FLAGS="--log-cli-level=ERROR --cov=audyn/ --cov-report=xml"

          if [ "${{ inputs.run-ddp }}" = "true" ]; then
            PYTEST_FLAGS="${PYTEST_FLAGS} --runddp"
          fi

          if [[ "${{ github.head_ref }}" == release/* ]]; then
            PYTEST_FLAGS="${PYTEST_FLAGS} --runslow"
          fi

          if [ "${RUNNER_OS}" = "Windows" ]]; then
            PYTEST_FLAGS="${PYTEST_FLAGS} -p no:faulthandler"
          fi

          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          uv run --active pytest -vvv ${PYTEST_FLAGS} tests/package/
      - name: Upload coverage reports to Codecov
        if: ${{ inputs.python-version == '3.13' && inputs.os == 'ubuntu-latest' && inputs.torch-version == '2.6.0' }}
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true
  recipes:
    name: Run recipe tests
    runs-on: ${{ inputs.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/audyn
            ~/.cache/audyn_test
          key: audyn-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            audyn-${{ runner.os }}-
      - name: Install dependencies (Windows)
        if: ${{ inputs.os == 'windows-latest' }}
        run: |
          powershell -File tests/scripts/install_windows_dependencies.ps1
      - name: Install dependencies (Ubuntu)
        if: ${{ inputs.os == 'ubuntu-latest' }}
        run: |
          . tests/scripts/free_ubuntu_disk.sh
          . tests/scripts/install_ubuntu_dependencies.sh
      - name: Install dependencies (MacOS)
        if: ${{ inputs.os == 'macos-15-intel' || inputs.os == 'macos-latest' }}
        run: |
          . tests/scripts/install_macos_dependencies.sh
      - name: Show version of FFmpeg
        run: |
          ffmpeg -version
      - name: Overwrite torch version in pyproject.toml
        shell: bash
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
          TORCH_VERSION: ${{ inputs.torch-version }}
        run: |
          uv venv --python ${PYTHON_VERSION}

          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          uv pip install packaging
          python tests/scripts/overwrite_pyproject_toml.py --path pyproject.toml --torch-version ${TORCH_VERSION}
      - name: Install dependencies
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          uv pip install -e ".[recipes]"

          if [ "${RUNNER_OS}" = "Windows" ]; then
            uv pip install soundfile
          fi
      - name: Install torchcodec
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          python tests/scripts/overwrite_torchcodec_requirement.py \
            --path requirements-torchcodec.txt

          uv pip install -r requirements-torchcodec.txt
      - name: Show dependencies
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          uv pip list
      - name: Verify version of torch
        shell: bash
        env:
          TORCH_VERSION: ${{ inputs.torch-version }}
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          python tests/scripts/verify_torch_version.py --torch-version "${TORCH_VERSION}"
      - name: Show backend of torchaudio
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          python tests/scripts/list_torchaudio_backends.py
          python tests/scripts/verify_torchaudio_backends.py
      - name: Recipe test
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
  
          cd tests/recipes/
          . ./test_all.sh
